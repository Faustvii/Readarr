name: Docker Build & Release

on:
  push:
    branches:
      - develop
    paths-ignore:
      - ".github/**"
      - "src/Readarr.Api.*/openapi.json"

env:
  DOTNET_VERSION: "6.0.x"
  NODE_VERSION: "20.x"

jobs:
  build_meta:
    runs-on: ubuntu-latest
    outputs:
      readarr_version: ${{ steps.semantic.outputs.new_release_version }}
      build_name: ${{ steps.semantic.outputs.new_release_version }}
      should_release: ${{ steps.semantic.outputs.new_release_published }}
      release_type: ${{ steps.semantic.outputs.release_type }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          semantic_version: 21
          branches: |
            [
              'develop'
            ]

  build_docker_image:
    runs-on: ubuntu-latest
    needs: build_meta
    if: needs.build_meta.outputs.should_release == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Lowercase Repository Name
        id: set_lowercase_repo
        run: |
          LOWERCASE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_REPO=${LOWERCASE_REPO}" >> $GITHUB_ENV

      - name: Build and Push Docker Image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_REPO }}:latest
            ghcr.io/${{ env.IMAGE_REPO }}:${{ needs.build_meta.outputs.readarr_version }}
          platforms: linux/amd64
          build-args: |
            VERSION=${{ needs.build_meta.outputs.readarr_version }}
            VENDOR=${{ github.repository_owner }}
            BRANCH=${{ needs.build_meta.outputs.build_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.build_meta.outputs.readarr_version }}
            org.opencontainers.image.revision=${{ github.sha }}

  update_release:
    runs-on: ubuntu-latest
    needs: [build_meta, build_docker_image]
    if: needs.build_meta.outputs.should_release == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Release with Docker Info
        uses: release-drafter/release-drafter@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Release v${{ needs.build_meta.outputs.readarr_version }}
          tag: v${{ needs.build_meta.outputs.readarr_version }}
          publish: true
          template: |
            ## Release v${{ needs.build_meta.outputs.readarr_version }}

            This is a ${{ needs.build_meta.outputs.release_type }} release.

            ### Docker Image

            Docker image: `ghcr.io/faustvii/readarr:v${{ needs.build_meta.outputs.readarr_version }}`

            ### Changes

            $CHANGES

  test_semantic:
    runs-on: ubuntu-latest
    needs: build_meta
    if: github.event_name == 'pull_request'
    steps:
      - name: Display Semantic Release Results
        run: |
          echo "=== Semantic Release Test Results ==="
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "PR Number: ${{ github.event.pull_request.number }}"
          echo ""
          echo "Version Analysis:"
          echo "- New Release Version: ${{ needs.build_meta.outputs.readarr_version }}"
          echo "- Should Release: ${{ needs.build_meta.outputs.should_release }}"
          echo "- Release Type: ${{ needs.build_meta.outputs.release_type }}"
          echo ""
          echo "This is a dry run - no actual releases or tags will be created."
          echo "If this was a push to develop, it would create:"
          echo "- Git tag: v${{ needs.build_meta.outputs.readarr_version }}"
          echo "- GitHub release with changelog"
          echo "- Docker image: ghcr.io/faustvii/readarr:v${{ needs.build_meta.outputs.readarr_version }}"
