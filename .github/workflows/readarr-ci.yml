name: Readarr CI & Docker Build

on:
  push:
    branches:
      - develop
      - master
    paths-ignore:
      - ".github/**"
      - "src/Readarr.Api.*/openapi.json"
  pull_request:
    branches:
      - develop
    paths-ignore:
      - ".github/**"
      - "src/NzbDrone.Core/Localization/Core/**"
      - "src/Readarr.Api.*/openapi.json"

env:
  DOTNET_VERSION: "6.0.x"
  NODE_VERSION: "20.x"

jobs:
  build_meta:
    runs-on: ubuntu-latest
    outputs:
      readarr_version: ${{ steps.set_version.outputs.readarr_version }}
      build_name: ${{ steps.set_version.outputs.build_name }}
    steps:
      - name: Set Readarr Version and Build Name
        id: set_version
        run: |
          MAJOR_VERSION="0.4.19"
          MINOR_VERSION=$((GITHUB_RUN_NUMBER))
          READARR_VERSION="${MAJOR_VERSION}.${MINOR_VERSION}"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # For pull requests, use "pr-<PR_NUMBER>" for a clear identifier
            BUILD_IDENTIFIER="pr-${{ github.event.pull_request.number }}"
          else
            # For push events, use the branch name (e.g., 'develop', 'master')
            # and sanitize it for use in names/tags (replace slashes, lowercase)
            RAW_BRANCH_NAME="${{ github.ref_name }}"
            # Replace slashes with hyphens, convert to lowercase for consistency
            BUILD_IDENTIFIER=$(echo "$RAW_BRANCH_NAME" | sed 's|/|-|g' | tr '[:upper:]' '[:lower:]')
          fi

          BUILD_NAME="${BUILD_IDENTIFIER}.${READARR_VERSION}"

          echo "readarr_version=${READARR_VERSION}" >> $GITHUB_OUTPUT
          echo "build_name=${BUILD_NAME}" >> $GITHUB_OUTPUT
          echo "Set Readarr Version: ${READARR_VERSION}"
          echo "Set Build Name: ${BUILD_NAME}"

  test:
    runs-on: ubuntu-latest
    needs: build_meta
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: "true"
          fetch-depth: 1

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Yarn Packages
        id: yarn-cache
        uses: actions/cache@v4
        with:
          path: ~/.yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Build and Run Tests
        run: |
          ./build.sh --backend
          ./build.sh --frontend
        env:
          DOTNETVERSION: ${{ env.DOTNET_VERSION }}
          FORCE_COLOR: 0
          YARN_CACHE_FOLDER: ${{ steps.yarn-cache.outputs.cache-hit == 'true' && '~/.yarn/cache' || '' }}

      - name: Make Test Dummy Executable (Unit)
        run: find _tests -name "Readarr.Test.Dummy" -exec chmod a+x {} \;

      - name: Run Unit Tests (Linux-x64)
        run: |
          ./test.sh Linux Unit Test
        env:
          OUTPUTFOLDER: _output
          TESTSFOLDER: _tests

      - name: Publish Unit Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Unit-Test-Results
          path: "**/TestResult.xml"

      - name: Start PostgreSQL 14 for Integration Tests
        run: |
          docker run -d --name=postgres14 \
          -e POSTGRES_PASSWORD=readarr \
          -e POSTGRES_USER=readarr \
          -p 5432:5432/tcp \
          postgres:14

      - name: Run Integration Tests (Linux-x64 with Postgres14)
        run: |
          chmod a+x _tests/test.sh
          TEST_DIR=${{ github.workspace }}/_tests _tests/test.sh Linux Integration Test
        env:
          Readarr__Postgres__Host: "localhost"
          Readarr__Postgres__Port: "5432"
          Readarr__Postgres__User: "readarr"
          Readarr__Postgres__Password: "readarr"
          OUTPUTFOLDER: _output
          TESTSFOLDER: _tests

      - name: Publish Integration Test Results (Postgres14)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Integration-Test-Results-Postgres14
          path: "**/TestResult.xml"

      - name: Start PostgreSQL 15 for Integration Tests
        run: |
          docker run -d --name=postgres15 \
          -e POSTGRES_PASSWORD=readarr \
          -e POSTGRES_USER=readarr \
          -p 5432:5432/tcp \
          postgres:15

      - name: Run Integration Tests (Linux-x64 with Postgres15)
        run: |
          chmod a+x _tests/test.sh
          TEST_DIR=${{ github.workspace }}/_tests _tests/test.sh Linux Integration Test
        env:
          Readarr__Postgres__Host: "localhost"
          Readarr__Postgres__Port: "5432"
          Readarr__Postgres__User: "readarr"
          Readarr__Postgres__Password: "readarr"
          OUTPUTFOLDER: _output
          TESTSFOLDER: _tests

      - name: Publish Integration Test Results (Postgres15)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Integration-Test-Results-Postgres15
          path: "**/TestResult.xml"

  build_docker_image:
    runs-on: ubuntu-latest
    needs: [build_meta, test]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Lowercase Repository Name
        id: set_lowercase_repo
        run: |
          LOWERCASE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_REPO=${LOWERCASE_REPO}" >> $GITHUB_ENV

      - name: Build and Push Docker Image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_REPO }}:latest
            ghcr.io/${{ env.IMAGE_REPO }}:${{ needs.build_meta.outputs.readarr_version }}
          platforms: linux/amd64
          build-args: |
            VERSION=${{ needs.build_meta.outputs.readarr_version }}
            VENDOR=${{ github.repository_owner }}
            BRANCH=${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.build_meta.outputs.readarr_version }}
            org.opencontainers.image.revision=${{ github.sha }}
